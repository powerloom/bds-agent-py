name: dex-alerts
version: 1

source:
  type: bds_stream
  endpoint: /mpp/stream/allTrades
  base_url: ${BDS_BASE_URL}

auth:
  profile: ${BDS_AGENT_PROFILE}

rules:
  - type: min_usd
    threshold: 50000
  - type: volume_spike
    multiplier: 3.0
    window_epochs: 10

sinks:
  - type: stdout

# On-chain CID check: eth_call to ProtocolState.maxSnapshotsCid(dataMarket, projectId, epochId)
# (needs verify_rpc_url or POWERLOOM_RPC_URL; set both contract addresses or rely on stream verification.*):
# verify: true
# verify_rpc_url: ${POWERLOOM_RPC_URL}
# verify_protocol_state: "0x1d0e010Ff11b781CA1dE34BD25a0037203e25E2a"
# verify_data_market: "0x26c44e5CcEB7Fe69Cffc933838CF40286b2dc01a"

verify: false

lifecycle:
  reconnect: true
  reconnect_delay: 5
  max_reconnects: 0
