name: Publish to PyPI and TestPyPI

on:
  push:
    branches:
      - develop
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
    types: [opened, synchronize]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      publish_to_testpypi:
        description: 'Publish to TestPyPI'
        required: false
        default: true
        type: boolean
      publish_to_pypi:
        description: 'Publish to PyPI (only works on tags)'
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true
        cache-dependency-glob: "**/uv.lock"

    - name: Install dependencies and project
      run: uv sync --frozen

    - name: Lint
      run: uv run ruff check src/bds_agent/

    - name: Run tests
      run: uv run pytest tests/ -v

    - name: Test CLI
      run: |
        uv run bds-agent --version
        uv run bds-agent --help

  build:
    name: Build Distribution Packages
    needs: test
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true
        cache-dependency-glob: "**/uv.lock"

    - name: Verify release tag matches pyproject.toml version
      if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/v')
      run: |
        TAG_VER="${GITHUB_REF_NAME#v}"
        PKG_VER=$(grep '^version = ' pyproject.toml | sed -n 's/version = "\([^"]*\)"/\1/p')
        if [ "$TAG_VER" != "$PKG_VER" ]; then
          echo "::error::Git ref is ${GITHUB_REF_NAME} but pyproject.toml version is ${PKG_VER}. Bump pyproject.toml before publishing."
          exit 1
        fi

    - name: Set version for TestPyPI
      if: (github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/develop')) && !startsWith(github.ref, 'refs/tags/')
      run: |
        CURRENT_VERSION=$(grep '^version' pyproject.toml | cut -d'"' -f2)

        if [[ "${{ github.event_name }}" == "pull_request" ]]; then
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          PR_NUM=$(printf "%04d" ${{ github.event.pull_request.number }})
          DEV_VERSION="${CURRENT_VERSION}.dev${TIMESTAMP}${PR_NUM}"
        else
          DEV_VERSION="${CURRENT_VERSION}.dev$(date +%Y%m%d%H%M%S)"
        fi

        echo "Setting version to $DEV_VERSION for TestPyPI"
        sed -i.bak "s/^version = \".*\"/version = \"$DEV_VERSION\"/" pyproject.toml
        rm pyproject.toml.bak

    - name: Build package
      run: uv build

    - name: Check build artifacts
      run: |
        ls -la dist/
        test -f dist/*.whl
        test -f dist/*.tar.gz

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: python-package-distributions
        path: dist/

  publish-to-testpypi:
    name: Publish to TestPyPI
    needs: build
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'pull_request' && github.base_ref == 'main') ||
      (github.event_name == 'push' && github.ref == 'refs/heads/develop') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.publish_to_testpypi == 'true')

    environment:
      name: testpypi
      url: https://test.pypi.org/p/bds-agent

    permissions:
      id-token: write

    steps:
    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        name: python-package-distributions
        path: dist/

    - name: List distribution files
      run: ls -la dist/

    - name: Publish to TestPyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        repository-url: https://test.pypi.org/legacy/
        skip-existing: true
        verbose: true

  publish-to-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    if: |
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'release' && github.event.action == 'published') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.publish_to_pypi == 'true' && startsWith(github.ref, 'refs/tags/'))

    environment:
      name: pypi
      url: https://pypi.org/p/bds-agent

    permissions:
      id-token: write

    steps:
    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        name: python-package-distributions
        path: dist/

    - name: List distribution files
      run: ls -la dist/

    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        verbose: true
